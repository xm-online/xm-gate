# ===================================================================
# Spring Boot configuration.
#
# This configuration will be overridden by the Spring profile you use,
# for example application-dev.yml if you use the "dev" profile.
#
# More information on profiles: https://www.jhipster.tech/profiles/
# More information on configuration properties: https://www.jhipster.tech/common-application-properties/
# ===================================================================

# ===================================================================
# Standard Spring Boot properties.
# Full reference is available at:
# https://docs.spring.io/spring-boot/appendix/application-properties/index.html
# ===================================================================

management:
  tracing:
    sampling:
      probability: 1.0 # report 100% of traces
  endpoints:
    web:
      base-path: /management
      exposure:
        include:
          - configprops
          - env
          - health
          - info
          - jhimetrics
          - jhiopenapigroups
          - logfile
          - loggers
          - metrics
          - prometheus
          - threaddump
  endpoint:
    health:
      show-details: when_authorized
    jhimetrics:
      access: read-only
  info:
    git:
      mode: full
    env:
      enabled: true
  health:
    mail:
      enabled: false # When using the MailService, configure an SMTP server and set this to true
  metrics:
    distribution:
      percentiles-histogram:
        all: true
    enable:
      all: true
  prometheus:
    metrics:
      export:
        enabled: true
        step: 60
oauth2:
  signature-verification:
    public-key-endpoint-uri: http://config/api/token_key

spring:
  application:
    name: gate
  threads:
    virtual:
      enabled: true
  cloud:
    consul:
      discovery:
        healthCheckPath: /management/health
        instanceId: ${spring.application.name}:${spring.application.instance-id:${random.value}}
        service-name: gate
        enabled: true
        prefer-ip-address: true
      config:
        watch:
          enabled: false
  docker:
    compose:
      enabled: true
      lifecycle-management: start-only
      file: src/main/docker/no.yml
  profiles:
    # The commented value for `active` can be replaced with valid Spring profiles to load.
    # Otherwise, it will be filled in by gradle when building the JAR file
    # Either way, it can be overridden by `--spring.profiles.active` value passed in the commandline or `-Dspring.profiles.active` set in `JAVA_OPTS`
    group:
      dev:
        - dev
        - api-docs
        # Uncomment to activate TLS for the dev profile
        #- tls
  jmx:
    enabled: false
  messages:
    basename: i18n/messages
  main:
    allow-bean-definition-overriding: true
  thymeleaf:
    mode: HTML
  output:
    ansi:
      console-available: true
  http:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  servlet:
    multipart:
      maxFileSize: 20MB
      maxRequestSize: 20MB
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  servlet:
    session:
      cookie:
        http-only: true
  shutdown: graceful

# Properties to be exposed on the /info management endpoint
info:
  # Comma separated list of profiles that will trigger the ribbon to show
  display-ribbon-on-profiles: 'dev'

xm-config:
  enabled: true
  xm-config-url: http://config:8084
  kafka-config-topic: config_topic

aspects:
  rest-call-logging: true

application:
  tenant-ignored-path-list: /v2/api-docs, /v3/api-docs, /api/profile-info, /swagger-resources/configuration/ui, /management/health
  tenant-properties-path-pattern: /config/tenants/{tenantName}/gate/${application.tenant-properties-name}
  tenant-properties-name: gate.yml
  lep-message-handling:
    disabled: true
  hosts:
    - localhost
    - local
  kafka-enabled: true
  kafka-system-queue: system_queue
  retry:
    max-attempts: 3
    delay: 1000 #in milliseconds
    multiplier: 2
  cors:
    allowed-origins: '*'
    allowed-methods: '*'
    allowed-headers: '*'
    exposed-headers: 'Authorization,Link,X-Total-Count'
    allow-credentials: true
    max-age: 1800
  security:
    client-authorization:
      access-token-uri: http://uaa/oauth/token
      token-service-id: uaa
      client-id: internal
      client-secret: internal
  logging:
    logstash: # Forward logs to logstash over a socket, used by LoggingConfiguration
      enabled: true
      host: localhost
      port: 5000
      ring-buffer-size: 512
