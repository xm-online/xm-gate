application:
  gateway:
    excluded-services:
      - consul
      - gate
spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: config
              uri: lb://config
              predicates:
                - Path=/config/**
              filters:
                - StripPrefix=1
                - AddHighLog
                - AddLogging
                - TfaTokenDetection
                - AccessControl
                - AddDomainRelayHeaders
                - IdpStatefulMode
                - name: RateLimitByTenantKey
                  args:
                    capacity: 10
                    periodInMinutes: 1
                - name: RateLimitByClientKey
                  args:
                    capacity: 5
                    periodInMinutes: 1
                - AddRequestHeader=X-Request-service, [CONFIG]
            - id: entity
              uri: lb://entity
              predicates:
                - Path=/entity/**
              filters:
                - StripPrefix=1
                - AddHighLog
                - AddLogging
                - AccessControl
                - AddDomainRelayHeaders
                - AddRequestHeader=X-Request-service, [ENTITY]
            - id: uaa
              uri: lb://uaa
              predicates:
                - Path=/uaa/**
              filters:
                - StripPrefix=1
                - AddHighLog
                - AddLogging
                - AccessControl
                - AddDomainRelayHeaders
                - AddRequestHeader=X-Request-service, [UAA]
